name: flutter
base: core22
version: git
summary: The Flutter SDK and tools for building multi-platform apps
title: Flutter
license: BSD-3-Clause
source-code: https://github.com/flutter/flutter
website: https://flutter.dev/
description: |
  Flutter is an open source framework for building beautiful, natively
  compiled, multi-platform applications from a single codebase.

  This snap packages the Flutter SDK and command-line tools, giving you
  everything needed to create, build, and run Flutter applications on Linux.

grade: stable
confinement: classic
architectures:
  - build-on: amd64
  - build-on: arm64

apps:
  flutter:
    command: flutter.sh
  openurl:
    command: openurl.sh
    desktop: flutter.desktop
  dart:
    command: dart.sh

parts:
  flutter:
    plugin: nil
    source: .
    override-build: |
      cp dart.sh $SNAPCRAFT_PART_INSTALL/
      cp flutter.sh $SNAPCRAFT_PART_INSTALL/
      cp env.sh $SNAPCRAFT_PART_INSTALL/
      cp openurl.sh $SNAPCRAFT_PART_INSTALL/
      cp flutter.desktop $SNAPCRAFT_PART_INSTALL/

      ENV_SH=$SNAPCRAFT_PART_INSTALL/env.sh
      sed -i 's#<CRAFT_ARCH_TRIPLET>#$CRAFT_ARCH_TRIPLET#' $ENV_SH
    stage-packages:
      - clang
      - llvm
      - cmake
      - curl
      - git
      - jq
      - libblkid1
      - libblkid-dev
      - libbsd0
      - libc6
      - libc6-dev
      - libc-bin
      - libcrypt1
      - libdbus-1-3
      - libedit2
      - libexpat1
      - libffi8
      - libfontconfig1
      - libjsoncpp25
      - libjsoncpp-dev
      - libgcc-s1
      - libgcrypt20
      - libgcrypt20-dev
      - libglib2.0-0
      - libglib2.0-dev
      - libglu1-mesa
      - libgpg-error0
      - libgtk-3-0
      - libgtk-3-dev
      - liblz4-1
      - liblz4-dev
      - liblzma5
      - liblzma-dev
      - libmd0
      - libmount1
      - libpcre3
      - libsecret-1-0
      - libsecret-1-dev
      - libselinux1
      - libsepol2
      - libstdc++-10-dev
      - libstdc++6
      - libtinfo6
      - libuuid1
      - libzstd1
      - ninja-build
      - pkg-config
      - rsync
      - tar
      - unzip
      - xz-utils
      - zlib1g
      - on amd64: [ i965-va-driver, libc6-dev-i386 ]
    prime:
      - -lib32
      - -libx32
      - -usr/lib32
      - -usr/libx32
      - -usr/lib/llvm-*/lib/clang/*/lib/linux/*i386*
      - -usr/share/doc
      - -usr/share/man
      - -usr/include/c++/6*
      - -usr/include/*/c++/6*
      - -usr/include/c++/7*
      - -usr/include/*/c++/7*
      - -usr/include/c++/8*
      - -usr/include/*/c++/8*
      - -usr/lib/gcc/*/6
      - -usr/lib/gcc/*/7
      - -usr/lib/gcc/*/8
      - -usr/share/perl*
      - -usr/lib/*/perl*
      - -usr/share/cmake*/Help
      - -usr/share/icons
      - -usr/share/pixmaps
      - -usr/share/rsync
    build-attributes:
      - enable-patchelf

  # Fix pkgconfig files
  pkgconfig:
    after: [flutter]
    plugin: nil
    override-prime: |
      set -eux
      for PC in $(find . -path "*/pkgconfig/*.pc")
      do
        sed -i 's#prefix=$SNAPCRAFT_STAGE#prefix=/snap/$SNAPCRAFT_PROJECT_NAME/current#' $PC
        sed -i 's#prefix = /usr#prefix=/snap/$SNAPCRAFT_PROJECT_NAME/current/usr#' $PC
        sed -i 's#prefix=/usr#prefix=/snap/$SNAPCRAFT_PROJECT_NAME/current/usr#' $PC
        sed -i 's#original_prefix=/snap/$SNAPCRAFT_PROJECT_NAME/current/usr#original_prefix=/usr#' $PC

        sed -i 's#libdir=/usr#libdir=${prefix}#' $PC
        sed -i 's#libdir=/lib#libdir=/snap/$SNAPCRAFT_PROJECT_NAME/current/lib#' $PC

        sed -i 's#exec_prefix=/usr#exec_prefix=${prefix}#' $PC
        sed -i 's#includedir=/usr#includedir=${prefix}#' $PC
        sed -i 's#sysconfdir=/etc#sysconfdir=/snap/$SNAPCRAFT_PROJECT_NAME/current/etc#' $PC

        sed -i 's#/usr/#/snap/$SNAPCRAFT_PROJECT_NAME/current/usr/#g' $PC
        sed -i 's#/etc/#/snap/$SNAPCRAFT_PROJECT_NAME/current/etc/#g' $PC
      done

  # Rewrite the bundled linker scripts and library symlinks to point inside
  # the snap so the toolchain links against the snap's own libraries rather
  # than the host's, keeping builds self-contained and independent of the
  # host's glibc.
  linker:
    after: [flutter]
    plugin: nil
    override-prime: |
      set -eux

      find . -type l -name "*.so*" -exec bash -c 'if [[ $(readlink $1) == /* ]] && [[ $(readlink $1) != /snap* ]]; then ln -sf /snap/flutter/current$(readlink $1) $1; fi' bash {} \;

      if [ -d lib/$CRAFT_ARCH_TRIPLET ]; then
        for lib in lib/$CRAFT_ARCH_TRIPLET/*
        do
          target=usr/lib/$CRAFT_ARCH_TRIPLET/$(basename $lib)
          if [ ! -e $target ]; then
            ln -s /snap/$SNAPCRAFT_PROJECT_NAME/current/$lib $target
          fi
        done
      fi

      if [ -d lib64 ]; then
        mkdir -p usr/lib64
        for lib in lib64/*
        do
          target=usr/lib64/$(basename $lib)
          if [ ! -e $target ]; then
            ln -s /snap/$SNAPCRAFT_PROJECT_NAME/current/$lib $target
          fi
        done
      fi

      for so in usr/lib/$CRAFT_ARCH_TRIPLET/libc.so usr/lib/$CRAFT_ARCH_TRIPLET/libpthread.so usr/lib/$CRAFT_ARCH_TRIPLET/libm.so
      do
        if [ -f $SNAPCRAFT_PRIME/$so ]; then
          sed -i "$SNAPCRAFT_PRIME/${so}" \
              -e "s# /lib/$CRAFT_ARCH_TRIPLET/# /snap/$SNAPCRAFT_PROJECT_NAME/current/usr/lib/$CRAFT_ARCH_TRIPLET/#g" \
              -e "s# /usr/lib/$CRAFT_ARCH_TRIPLET/# /snap/$SNAPCRAFT_PROJECT_NAME/current/usr/lib/$CRAFT_ARCH_TRIPLET/#g" \
              -e "s# /lib64/# /snap/$SNAPCRAFT_PROJECT_NAME/current/usr/lib64/#g"
        fi
      done

